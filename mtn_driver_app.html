<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MTN Driver App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --surface:#161920; --surface2:#1e222c; --border:#272d3a;
  --accent:#00d4aa; --accent2:#f59e0b; --danger:#ef4444; --ok:#10b981;
  --warn:#f59e0b; --blue:#3b82f6; --muted:#6b7280; --text:#e8eaf0; --text2:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}
input,select,textarea{font-family:'DM Sans',sans-serif;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── LOGIN SCREEN ── */
#loginScreen{align-items:center;justify-content:center;padding:24px;}
.login-box{width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{font-size:52px;margin-bottom:8px;}
.login-logo h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:.05em;}
.login-logo p{font-size:13px;color:var(--muted);margin-top:4px;}
.login-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;display:block;}
.login-select{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;appearance:none;margin-bottom:16px;}
.login-select:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:16px;border-radius:12px;border:none;background:var(--accent);color:#000;font-size:16px;font-weight:700;transition:all .15s;margin-bottom:12px;}
.login-btn:hover{background:#00bfa3;}
.admin-link{text-align:center;font-size:13px;color:var(--muted);}
.admin-link span{color:var(--accent);cursor:pointer;text-decoration:underline;}

/* ── DRIVER APP ── */
#driverScreen{background:var(--bg);}
.driver-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.driver-name{font-size:15px;font-weight:700;}
.driver-date{font-size:11px;color:var(--muted);}
.header-actions{display:flex;gap:8px;align-items:center;}
.logout-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;}

/* STATUS BAR */
.status-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.status-cell{background:var(--surface);padding:12px;text-align:center;}
.status-cell .sval{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);display:block;}
.status-cell .slbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}

/* DRIVER TABS */
.driver-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.dtab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;}
.dtab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ROUTES TAB */
.routes-content{flex:1;overflow-y:auto;padding:16px;}
.date-section{margin-bottom:20px;}
.date-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.date-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ROUTE CARD */
.route-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.route-card.upcoming{border-color:rgba(0,212,170,.3);}
.route-card.active-route{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,212,170,.2);}
.route-card.done{opacity:.55;}
.route-card-header{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.rc-left{flex:1;}
.rc-load{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:3px;}
.rc-route{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;word-break:break-all;}
.rc-meta{display:flex;gap:6px;flex-wrap:wrap;}
.rc-pill{font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--text2);}
.rc-pill.amzl{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.3);color:var(--accent);}
.rc-pill.ddu{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#818cf8;}
.rc-time{text-align:right;flex-shrink:0;}
.rc-start{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
.rc-countdown{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;margin-top:3px;text-align:center;}
.rc-countdown.soon{background:rgba(245,158,11,.2);color:var(--warn);}
.rc-countdown.now{background:rgba(16,185,129,.2);color:var(--ok);animation:glow 1.5s infinite;}
.rc-countdown.past{background:rgba(107,114,128,.15);color:var(--muted);}
.rc-countdown.alert{background:rgba(239,68,68,.2);color:var(--danger);}
@keyframes glow{0%,100%{box-shadow:none;}50%{box-shadow:0 0 8px rgba(16,185,129,.4);}}

/* STOPS */
.route-stops{border-top:1px solid var(--border);padding:12px 16px;}
.stop-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stop-row:last-child{margin-bottom:0;}
.stop-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;}
.stop-num.first{background:rgba(0,212,170,.15);border-color:var(--accent);color:var(--accent);}
.stop-num.last{background:rgba(245,158,11,.15);border-color:var(--accent2);color:var(--accent2);}
.stop-fac{font-size:12px;color:var(--text2);flex:1;}
.stop-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);}

/* ACTION BUTTONS */
.route-actions{border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;}
.action-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:12px;font-weight:700;transition:all .15s;}
.action-btn.confirm{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);color:var(--blue);}
.action-btn.confirm.done{background:rgba(59,130,246,.3);color:var(--blue);}
.action-btn.dispatch{background:var(--accent);color:#000;}
.action-btn.dispatch.done{background:rgba(16,185,129,.2);border:1px solid var(--ok);color:var(--ok);}
.action-btn.dispatch:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* GAS TAB */
.gas-content{flex:1;overflow-y:auto;padding:16px;}
.gas-upload-box{background:var(--surface);border:2px dashed var(--border);border-radius:16px;padding:32px 20px;text-align:center;margin-bottom:16px;transition:border-color .15s;}
.gas-upload-box:hover{border-color:var(--accent);}
.gas-upload-box .icon{font-size:40px;margin-bottom:12px;}
.gas-upload-box h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.gas-upload-box p{font-size:12px;color:var(--muted);margin-bottom:16px;}
.gas-file-btn{display:inline-block;padding:12px 24px;border-radius:10px;background:var(--accent);color:#000;font-size:13px;font-weight:700;cursor:pointer;}
#gasFileInput{display:none;}
.gas-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.gas-form label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:6px;}
.gas-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;}
.gas-input:focus{border-color:var(--accent);}
.gas-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:none;}
.gas-submit{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent2);color:#000;font-size:14px;font-weight:700;}
.gas-history{margin-top:8px;}
.gas-history h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
.gas-entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;}
.gas-entry img{width:56px;height:56px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.gas-entry-info .ge-amount{font-size:16px;font-weight:700;color:var(--accent2);}
.gas-entry-info .ge-date{font-size:10px;color:var(--muted);}
.gas-entry-info .ge-load{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);}

/* ── ADMIN SCREEN ── */
#adminScreen{background:var(--bg);}
.admin-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.admin-header h1{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
.admin-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.atab{flex:1;padding:11px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;}
.atab.active{color:var(--accent);border-bottom-color:var(--accent);}
.atab .abadge{background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:4px;}
.admin-content{flex:1;overflow-y:auto;}

/* ADMIN OVERVIEW */
.admin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;}
.astat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.astat .anum{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--accent);display:block;}
.astat .albl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}

/* DRIVER STATUS CARDS */
.driver-status-list{padding:0 16px 16px;}
.ds-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.ds-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ds-name{font-size:14px;font-weight:700;}
.ds-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;}
.ds-badge.active{background:rgba(16,185,129,.15);color:var(--ok);}
.ds-badge.idle{background:rgba(107,114,128,.15);color:var(--muted);}
.ds-badge.dispatched{background:rgba(0,212,170,.15);color:var(--accent);}
.ds-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ds-cell{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.ds-cell label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:2px;}
.ds-cell value{font-size:11px;font-weight:600;color:var(--text);}
.ds-cell value.ok{color:var(--ok);}
.ds-cell value.warn{color:var(--warn);}
.ds-alert-btn{width:100%;margin-top:10px;padding:9px;border-radius:9px;border:1px solid var(--accent2);background:rgba(245,158,11,.1);color:var(--accent2);font-size:12px;font-weight:600;}

/* GAS ADMIN */
.gas-admin-list{padding:16px;}
.gas-admin-entry{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.gae-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.gae-driver{font-size:13px;font-weight:700;}
.gae-amount{font-size:16px;font-weight:700;color:var(--accent2);}
.gae-img{width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px;}
.gae-meta{font-size:10px;color:var(--muted);display:flex;gap:12px;}
.gae-meta span{font-family:'Space Mono',monospace;color:var(--text2);}
.empty-admin{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-admin .icon{font-size:36px;margin-bottom:10px;}

/* TOAST */
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;width:90%;max-width:340px;}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;text-align:center;animation:toastIn .3s ease;border:1px solid;}
.toast.success{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:var(--ok);}
.toast.info{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:var(--blue);}
.toast.warn{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--warn);}
.toast.alert{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:var(--danger);}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* NOTIFICATION BANNER */
.notif-banner{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 16px;margin:12px 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--warn);}
.notif-banner button{padding:6px 12px;border-radius:7px;border:1px solid var(--warn);background:transparent;color:var(--warn);font-size:11px;font-weight:600;flex-shrink:0;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="screen active" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🚛</div>
      <h1>MTN DRIVER</h1>
      <p>Operations Platform</p>
    </div>
    <label class="login-label">Select Your Name</label>
    <select class="login-select" id="driverSelect">
      <option value="">— Choose driver —</option>
    </select>
    <button class="login-btn" onclick="loginDriver()">Start My Shift →</button>
    <div class="admin-link">Manager? <span onclick="showAdmin()">Open Admin Panel</span></div>
  </div>
</div>

<!-- ═══ DRIVER APP ═══ -->
<div class="screen" id="driverScreen">
  <div class="driver-header">
    <div>
      <div class="driver-name" id="driverNameHeader">—</div>
      <div class="driver-date" id="driverDateHeader">—</div>
    </div>
    <div class="header-actions">
      <button class="logout-btn" onclick="logout()">← Exit</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-cell"><span class="sval" id="statTotal">0</span><div class="slbl">Routes</div></div>
    <div class="status-cell"><span class="sval" id="statDone">0</span><div class="slbl">Dispatched</div></div>
    <div class="status-cell"><span class="sval" id="statNext">—</span><div class="slbl">Next Pickup</div></div>
  </div>

  <div class="driver-tabs">
    <button class="dtab active" onclick="switchDriverTab('routes')">📋 My Routes</button>
    <button class="dtab" onclick="switchDriverTab('gas')">⛽ Gas Receipt</button>
  </div>

  <div id="driverRoutesTab" style="flex:1;overflow-y:auto;padding:16px;display:block;" class="routes-content"></div>
  <div id="driverGasTab" style="flex:1;overflow-y:auto;display:none;" class="gas-content">
    <div id="notifBanner" class="notif-banner" style="display:none;">
      <span>🔔 Enable notifications to get 10-min trip alerts</span>
      <button onclick="requestNotifications()">Enable</button>
    </div>
    <div class="gas-upload-box">
      <div class="icon">📸</div>
      <h3>Upload Gas Receipt</h3>
      <p>Take a photo or upload your receipt image</p>
      <label class="gas-file-btn" for="gasFileInput">📷 Take / Choose Photo</label>
      <input type="file" id="gasFileInput" accept="image/*" capture="environment" onchange="handleGasPhoto(this)">
    </div>
    <div class="gas-form" id="gasForm" style="display:none;">
      <img id="gasPreview" class="gas-preview" style="display:block;">
      <label>Amount Paid ($)</label>
      <input class="gas-input" type="number" id="gasAmount" placeholder="e.g. 87.50" step="0.01">
      <label>Load ID (which route)</label>
      <input class="gas-input" type="text" id="gasLoadId" placeholder="e.g. 113BNXJ85">
      <label>Notes (optional)</label>
      <input class="gas-input" type="text" id="gasNotes" placeholder="Station name, pump #, etc">
      <button class="gas-submit" onclick="submitGasReceipt()">✅ Submit Receipt</button>
    </div>
    <div class="gas-history" id="gasHistoryDiv">
      <h3>My Recent Receipts</h3>
      <div id="gasHistoryList"></div>
    </div>
  </div>
</div>

<!-- ═══ ADMIN SCREEN ═══ -->
<div class="screen" id="adminScreen">
  <div class="admin-header">
    <h1>🛠 ADMIN PANEL</h1>
    <button class="logout-btn" onclick="showLogin()">← Back</button>
  </div>
  <div class="admin-tabs">
    <button class="atab active" onclick="switchAdminTab('overview')">📊 Overview</button>
    <button class="atab" onclick="switchAdminTab('drivers')">🚛 Drivers</button>
    <button class="atab" onclick="switchAdminTab('gas')" id="gasAdminTab">⛽ Gas <span class="abadge" id="gasCount">0</span></button>
  </div>
  <div class="admin-content" id="adminContent"></div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

// ═══════════════════════════════════════════════
//  STATE  (persisted in localStorage)
// ═══════════════════════════════════════════════
let currentDriver = null;
let notifTimer = null;

const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem('mtn_'+k)||'null'); } catch{ return null; } },
  set: (k,v) => localStorage.setItem('mtn_'+k, JSON.stringify(v)),
};

// confirmations: { load_id: { confirmed: bool, dispatched: bool, dispatchTime: str } }
let confirmations = LS.get('confirmations') || {};
// gasReceipts: [ { driver, load_id, amount, notes, imageData, timestamp } ]
let gasReceipts = LS.get('gasReceipts') || [];
// driverStatus: { driver: { lastSeen, currentLoad, dispatched } }
let driverStatus = LS.get('driverStatus') || {};

function saveAll() {
  LS.set('confirmations', confirmations);
  LS.set('gasReceipts', gasReceipts);
  LS.set('driverStatus', driverStatus);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  // Populate driver select
  const sel = document.getElementById('driverSelect');
  Object.keys(ROUTES).sort().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

// ═══════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLogin() { showScreen('loginScreen'); }
function showAdmin() { showScreen('adminScreen'); renderAdmin('overview'); }
function logout() { currentDriver = null; clearInterval(notifTimer); showScreen('loginScreen'); }

function loginDriver() {
  const d = document.getElementById('driverSelect').value;
  if (!d) { toast('Please select your name','warn'); return; }
  currentDriver = d;
  // Update status
  if (!driverStatus[d]) driverStatus[d] = {};
  driverStatus[d].lastSeen = new Date().toISOString();
  saveAll();
  renderDriverApp();
  showScreen('driverScreen');
  requestNotifications();
  startNotifTimer();
}

// ═══════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════
function requestNotifications() {
  if (!('Notification' in window)) return;
  const banner = document.getElementById('notifBanner');
  if (Notification.permission === 'granted') {
    if (banner) banner.style.display = 'none';
  } else if (Notification.permission !== 'denied') {
    if (banner) banner.style.display = 'flex';
    Notification.requestPermission().then(p => {
      if (p === 'granted' && banner) banner.style.display = 'none';
    });
  }
}

function startNotifTimer() {
  clearInterval(notifTimer);
  notifTimer = setInterval(checkUpcomingTrips, 30000); // check every 30s
  checkUpcomingTrips();
}

function checkUpcomingTrips() {
  if (!currentDriver || Notification.permission !== 'granted') return;
  const routes = ROUTES[currentDriver] || [];
  const now = new Date();
  routes.forEach(r => {
    if (!r.stops || !r.stops.length) return;
    const conf = confirmations[r.load_id];
    if (conf?.dispatched) return;
    const firstStop = r.stops[0];
    // Build full datetime
    const tripDT = new Date(r.date + 'T' + firstStop.time + ':00');
    const diffMin = (tripDT - now) / 60000;
    if (diffMin > 9 && diffMin <= 11) {
      // 10-minute warning — only fire once
      const key = 'notif_' + r.load_id;
      if (!LS.get(key)) {
        LS.set(key, true);
        new Notification('⏰ 10-Min Alert — ' + currentDriver.split(' ')[0], {
          body: `Route ${r.load_id} starts at ${firstStop.time}\n${r.route}`,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🚛</text></svg>'
        });
        toast(`⏰ 10 min until route ${r.load_id}!`, 'alert');
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  DRIVER APP RENDER
// ═══════════════════════════════════════════════
function renderDriverApp() {
  const routes = ROUTES[currentDriver] || [];
  document.getElementById('driverNameHeader').textContent = currentDriver.split(' ')[0] + ' ' + (currentDriver.split(' ').slice(-1)[0] || '');
  document.getElementById('driverDateHeader').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

  const dispatched = routes.filter(r => confirmations[r.load_id]?.dispatched).length;
  document.getElementById('statTotal').textContent = routes.length;
  document.getElementById('statDone').textContent = dispatched;

  // Find next upcoming
  const now = new Date();
  let nextTime = null;
  routes.forEach(r => {
    if (confirmations[r.load_id]?.dispatched) return;
    if (!r.stops?.length) return;
    const dt = new Date(r.date + 'T' + r.stops[0].time + ':00');
    if (dt > now && (!nextTime || dt < nextTime)) nextTime = dt;
  });
  document.getElementById('statNext').textContent = nextTime
    ? nextTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '—';

  renderRoutesTab();
  renderGasHistory();
}

function renderRoutesTab() {
  const routes = ROUTES[currentDriver] || [];
  const container = document.getElementById('driverRoutesTab');

  // Group by date
  const byDate = {};
  routes.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  if (!routes.length) {
    container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--muted)"><div style="font-size:36px;margin-bottom:10px">📭</div><p>No routes assigned</p></div>';
    return;
  }

  const now = new Date();

  container.innerHTML = Object.entries(byDate).sort().map(([date, dayRoutes]) => {
    const label = new Date(date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    return `<div class="date-section">
      <div class="date-label">${label}</div>
      ${dayRoutes.map(r => renderRouteCard(r, now)).join('')}
    </div>`;
  }).join('');
}

function renderRouteCard(r, now) {
  const conf = confirmations[r.load_id] || {};
  const firstStop = r.stops?.[0];
  const lastStop = r.stops?.[r.stops.length-1];
  const facs = r.facilities || [];

  let countdownHtml = '';
  let cardClass = '';
  if (firstStop) {
    const tripDT = new Date(r.date + 'T' + firstStop.time + ':00');
    const diffMin = Math.round((tripDT - now) / 60000);
    if (conf.dispatched) {
      cardClass = 'done';
      countdownHtml = `<div class="rc-countdown past">✅ Dispatched</div>`;
    } else if (diffMin < -30) {
      cardClass = 'done';
      countdownHtml = `<div class="rc-countdown past">Passed</div>`;
    } else if (diffMin <= 0) {
      cardClass = 'active-route';
      countdownHtml = `<div class="rc-countdown now">🟢 GO NOW</div>`;
    } else if (diffMin <= 10) {
      cardClass = 'upcoming';
      countdownHtml = `<div class="rc-countdown alert">⚠️ ${diffMin}m left</div>`;
    } else if (diffMin <= 60) {
      cardClass = 'upcoming';
      countdownHtml = `<div class="rc-countdown soon">in ${diffMin} min</div>`;
    } else {
      const h = Math.floor(diffMin/60), m = diffMin%60;
      countdownHtml = `<div class="rc-countdown past">in ${h}h ${m}m</div>`;
    }
  }

  const typeClass = r.shipper?.includes('AMZL') ? 'amzl' : r.shipper?.includes('DDU') ? 'ddu' : '';
  const dispatched = conf.dispatched;
  const confirmed = conf.confirmed;

  return `<div class="route-card ${cardClass}" id="card_${r.load_id}">
    <div class="route-card-header">
      <div class="rc-left">
        <div class="rc-load">${r.load_id}</div>
        <div class="rc-route">${r.route}</div>
        <div class="rc-meta">
          <span class="rc-pill ${typeClass}">${(r.shipper||'').replace('Outbound','')}</span>
          <span class="rc-pill">${r.distance} mi</span>
          <span class="rc-pill">${r.stops?.length || 0} stops</span>
        </div>
      </div>
      <div class="rc-time">
        <div class="rc-start">${firstStop?.time || '—'}</div>
        ${countdownHtml}
      </div>
    </div>

    <div class="route-stops">
      ${(facs).map((f,i) => {
        const stopData = r.stops?.[i];
        const isFirst = i === 0, isLast = i === facs.length-1;
        return `<div class="stop-row">
          <div class="stop-num ${isFirst?'first':isLast?'last':''}">${i+1}</div>
          <div class="stop-fac">${f}</div>
          <div class="stop-time">${stopData?.time || ''}</div>
        </div>`;
      }).join('')}
    </div>

    ${!dispatched ? `<div class="route-actions">
      <button class="action-btn confirm ${confirmed?'done':''}" onclick="confirmInTruck('${r.load_id}')">
        ${confirmed ? '✅ In Truck' : '🚛 Confirm In Truck'}
      </button>
      <button class="action-btn dispatch ${dispatched?'done':''}" onclick="dispatchRoute('${r.load_id}')" ${!confirmed?'disabled':''}>
        ${dispatched ? '✅ Dispatched' : '🚦 Dispatch'}
      </button>
    </div>` : ''}
  </div>`;
}

function confirmInTruck(loadId) {
  if (!confirmations[loadId]) confirmations[loadId] = {};
  confirmations[loadId].confirmed = true;
  confirmations[loadId].confirmTime = new Date().toLocaleTimeString();
  // update driver status
  if (!driverStatus[currentDriver]) driverStatus[currentDriver] = {};
  driverStatus[currentDriver].currentLoad = loadId;
  driverStatus[currentDriver].status = 'confirmed';
  saveAll();
  toast('✅ Confirmed in truck!', 'success');
  renderDriverApp();
}

function dispatchRoute(loadId) {
  if (!confirmations[loadId]?.confirmed) { toast('Confirm in truck first!','warn'); return; }
  confirmations[loadId].dispatched = true;
  confirmations[loadId].dispatchTime = new Date().toLocaleTimeString();
  if (!driverStatus[currentDriver]) driverStatus[currentDriver] = {};
  driverStatus[currentDriver].status = 'dispatched';
  driverStatus[currentDriver].dispatchTime = new Date().toLocaleString();
  saveAll();
  toast('🚦 Dispatched! Safe travels!', 'success');
  renderDriverApp();
}

// ═══════════════════════════════════════════════
//  DRIVER TABS
// ═══════════════════════════════════════════════
function switchDriverTab(tab) {
  document.querySelectorAll('.dtab').forEach((t,i) => t.classList.toggle('active', ['routes','gas'][i] === tab));
  document.getElementById('driverRoutesTab').style.display = tab === 'routes' ? 'block' : 'none';
  document.getElementById('driverGasTab').style.display = tab === 'gas' ? 'block' : 'none';
  if (tab === 'gas') renderGasHistory();
}

// ═══════════════════════════════════════════════
//  GAS RECEIPTS
// ═══════════════════════════════════════════════
let currentGasImage = null;

function handleGasPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentGasImage = e.target.result;
    document.getElementById('gasPreview').src = currentGasImage;
    document.getElementById('gasForm').style.display = 'block';
    // Pre-fill load ID from current route
    const routes = ROUTES[currentDriver] || [];
    const active = routes.find(r => confirmations[r.load_id]?.confirmed && !confirmations[r.load_id]?.dispatched);
    if (active) document.getElementById('gasLoadId').value = active.load_id;
  };
  reader.readAsDataURL(file);
}

function submitGasReceipt() {
  const amount = document.getElementById('gasAmount').value;
  const loadId = document.getElementById('gasLoadId').value;
  if (!amount) { toast('Enter the amount paid','warn'); return; }
  if (!currentGasImage) { toast('Please take/choose a photo','warn'); return; }

  const receipt = {
    driver: currentDriver,
    load_id: loadId || 'N/A',
    amount: parseFloat(amount).toFixed(2),
    notes: document.getElementById('gasNotes').value,
    imageData: currentGasImage,
    timestamp: new Date().toLocaleString(),
  };
  gasReceipts.unshift(receipt);
  saveAll();

  // Reset form
  currentGasImage = null;
  document.getElementById('gasForm').style.display = 'none';
  document.getElementById('gasFileInput').value = '';
  document.getElementById('gasAmount').value = '';
  document.getElementById('gasLoadId').value = '';
  document.getElementById('gasNotes').value = '';

  toast('⛽ Receipt submitted!', 'success');
  renderGasHistory();
}

function renderGasHistory() {
  const myReceipts = gasReceipts.filter(r => r.driver === currentDriver);
  const list = document.getElementById('gasHistoryList');
  if (!list) return;
  if (!myReceipts.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px">No receipts yet</div>';
    return;
  }
  list.innerHTML = myReceipts.slice(0,5).map(r => `
    <div class="gas-entry">
      <img src="${r.imageData}" alt="Receipt">
      <div class="gas-entry-info">
        <div class="ge-amount">$${r.amount}</div>
        <div class="ge-load">${r.load_id}</div>
        <div class="ge-date">${r.timestamp}</div>
        ${r.notes ? `<div style="font-size:10px;color:var(--muted)">${r.notes}</div>` : ''}
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════
let currentAdminTab = 'overview';

function switchAdminTab(tab) {
  currentAdminTab = tab;
  document.querySelectorAll('.atab').forEach((t,i) => t.classList.toggle('active', ['overview','drivers','gas'][i] === tab));
  renderAdmin(tab);
}

function renderAdmin(tab) {

  document.getElementById('gasCount').textContent = gasReceipts.length;

    const allDrivers = Object.keys(ROUTES);

    const gasTotal = gasReceipts.reduce((s,r) => s + parseFloat(r.amount||0), 0);

    c.innerHTML = `
      <div class="admin-stats">

      <div style="padding:0 16px 16px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;">Driver Quick Status</div>

          const status = driverStatus[d] || {};
          const routes = ROUTES[d] || [];
          const myDispatched = routes.filter(r => confirmations[r.load_id]?.dispatched).length;
          const myConfirmed = routes.filter(r => confirmations[r.load_id]?.confirmed && !confirmations[r.load_id]?.dispatched).length;
          const badge = myDispatched > 0 ? 'dispatched' : myConfirmed > 0 ? 'active' : 'idle';
          const badgeLabel = myDispatched > 0 ? '🚦 Dispatched' : myConfirmed > 0 ? '🚛 In Truck' : '⚪ Idle';
          return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:13px;font-weight:600">${d}</div>
              <div style="font-size:10px;color:var(--muted)">${routes.length} routes · ${myDispatched} dispatched</div>
            </div>
            <span class="ds-badge ${badge}">${badgeLabel}</span>
          </div>`;
        }).join('')}
      </div>`;
  }

  else if (tab === 'drivers') {
    const allDrivers = Object.keys(ROUTES);
    c.innerHTML = `<div class="driver-status-list">${allDrivers.map(d => {
      const routes = ROUTES[d] || [];
      const status = driverStatus[d] || {};
      const myDispatched = routes.filter(r => confirmations[r.load_id]?.dispatched).length;
      const myConfirmed = routes.filter(r => confirmations[r.load_id]?.confirmed && !confirmations[r.load_id]?.dispatched).length;
      const activeRoute = routes.find(r => confirmations[r.load_id]?.confirmed && !confirmations[r.load_id]?.dispatched);
      const badge = myDispatched > 0 ? 'dispatched' : myConfirmed > 0 ? 'active' : 'idle';
      const badgeLabel = myDispatched > 0 ? '🚦 On Route' : myConfirmed > 0 ? '🚛 In Truck' : '⚪ Idle';

      return `<div class="ds-card">
        <div class="ds-header">
          <div class="ds-name">${d}</div>
          <span class="ds-badge ${badge}">${badgeLabel}</span>
        </div>
        <div class="ds-grid">
          <div class="ds-cell"><label>Total Routes</label><value>${routes.length}</value></div>
          <div class="ds-cell"><label>Dispatched</label><value class="${myDispatched>0?'ok':''}">${myDispatched}</value></div>
          <div class="ds-cell"><label>In Truck</label><value class="${myConfirmed>0?'warn':''}">${myConfirmed}</value></div>
          <div class="ds-cell"><label>Gas Receipts</label><value>${gasReceipts.filter(r=>r.driver===d).length}</value></div>
        </div>
        ${activeRoute ? `<div style="margin-top:10px;background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:11px;">
          <div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Current Load</div>
          <div style="font-family:'Space Mono',monospace;color:var(--accent)">${activeRoute.load_id}</div>
          <div style="color:var(--text2)">${activeRoute.route}</div>
        </div>` : ''}
        <button class="ds-alert-btn" onclick="adminAlert('${d}')">🔔 Send Alert to ${d.split(' ')[0]}</button>
      </div>`;
    }).join('')}</div>`;
  }

  else if (tab === 'gas') {
    if (!gasReceipts.length) {
      c.innerHTML = '<div class="empty-admin"><div class="icon">⛽</div><p>No gas receipts submitted yet</p></div>';
      return;
    }
    const total = gasReceipts.reduce((s,r) => s + parseFloat(r.amount||0), 0);
    c.innerHTML = `
      <div style="padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--muted)">${gasReceipts.length} receipts total</div>
        <div style="font-size:16px;font-weight:700;color:var(--accent2)">Total: $${total.toFixed(2)}</div>
      </div>
      <div class="gas-admin-list">
        ${gasReceipts.map(r => `
          <div class="gas-admin-entry">
            <div class="gae-header">
              <div class="gae-driver">${r.driver.split(' ')[0]} ${r.driver.split(' ').slice(-1)[0]}</div>
              <div class="gae-amount">$${r.amount}</div>
            </div>
            <img class="gae-img" src="${r.imageData}" alt="Receipt" onclick="this.style.maxHeight=this.style.maxHeight==='none'?'180px':'none'">
            <div class="gae-meta">
              <span>Load: <span>${r.load_id}</span></span>
              <span>${r.timestamp}</span>
            </div>
            ${r.notes ? `<div style="font-size:10px;color:var(--text2);margin-top:4px">${r.notes}</div>` : ''}
          </div>`).join('')}
      </div>`;
  }
}

function adminAlert(driver) {
  if (Notification.permission === 'granted') {
    new Notification(`📢 Manager Alert — ${driver.split(' ')[0]}`, {
      body: `Check in with dispatch immediately.`
    });
    toast(`Alert sent to ${driver.split(' ')[0]}`, 'success');
  } else {
    toast('Enable browser notifications first', 'warn');
  }
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function toast(msg, type='info') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ═══════════════════════════════════════════════
//  AUTO-REFRESH every 60s for countdowns
// ═══════════════════════════════════════════════
setInterval(() => { if (currentDriver) renderDriverApp(); }, 60000);

init();
</script>
</body>
</html>
